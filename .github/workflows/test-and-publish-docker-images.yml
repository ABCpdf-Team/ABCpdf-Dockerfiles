name: Build, Test and Publish ABCpdf Images

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  schedule:
     - cron: '0 3 * * 2'  # 4am UK time on Tuesdays (3am UTC for BST, 4am UTC would be 5am BST)
  workflow_dispatch:

jobs:
  build-test-publish-base-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Continue running all jobs in the matrix even if one fails
      matrix:
        include:
          # Out of support versions of .net
          - os: "bookworm-slim"
            dotnet-version: "6.0"
            abcpdf-version: "13"
            abcchrome-version: "123"

          - os: "bookworm-slim"
            dotnet-version: "7.0"
            abcpdf-version: "13"
            abcchrome-version: "123"

          - os: "22.04-jammy"
            dotnet-version: "6.0"
            abcpdf-version: "13"
            abcchrome-version: "123"     

          - os: "22.04-jammy"
            dotnet-version: "7.0"
            abcpdf-version: "13"
            abcchrome-version: "123"     

          # Supported images
          - os: "bookworm-slim"
            dotnet-version: "8.0"
            abcpdf-version: "13"
            abcchrome-version: "123"

          - os: "22.04-jammy"
            dotnet-version: "8.0"
            abcpdf-version: "13"
            abcchrome-version: "123"

          - os: "24.04-noble"
            dotnet-version: "8.0"
            abcpdf-version: "13"
            abcchrome-version: "123"

          # - os: "26.04-resolute"
          #   dotnet-version: "10.0"
          #   abcpdf-version: "14"
          #   abcchrome-version: "123"

          # - os: "26.04-resolute"
          #   dotnet-version: "10.0"
          #   abcpdf-version: "14"
          #   abcchrome-version: "146"
    env:
      DOTNET_VERSION: ${{ matrix.dotnet-version }}
      BASE_IMAGE_TAG: abcpdf/mcr-aspnet:${{ matrix.dotnet-version }}-${{ matrix.os }}-${{ github.sha }}
      TEST_APP_IMAGE_TAG: abcpdf_test_app_container:${{ matrix.dotnet-version }}-${{ matrix.os }}
      PUBLISH_IMAGE_TAG: abcpdf/mcr-aspnet:${{ matrix.dotnet-version }}-${{ matrix.os }}
      # What os to use if they only specify the dotnet version when pulling. 
      # We should probably deprecate this eventually in favor of always requiring the os to be specified
      DEFAULT_OS: "24.04-noble"
      # Condition for scans and publish to docker hub - on schedule, manual trigger, or pushes to main
      RUN_PUBLISH_STEPS: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    steps:
    - uses: actions/checkout@v6
    - name: Build and test base Image and application image
      run: |
        chmod +x build-and-test-distro.sh
        ./build-and-test-distro.sh ${{ matrix.os }} ${{ matrix.dotnet-version }} ${{ matrix.abcpdf-version }} ${{ matrix.abcchrome-version }} ${{ secrets.ABCPDF14_LICENSE_KEY }}

    - name: Run Trivy vulnerability scanner
      if: env.RUN_PUBLISH_STEPS == 'true'
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: ${{ env.TEST_APP_IMAGE_TAG }}
        format: 'template'
        template: '@.github/trivy/html.tpl'
        output: 'trivy-results.html'

    - name: Prepare scan report for pages
      if: env.RUN_PUBLISH_STEPS == 'true'
      run: |
        mkdir -p scan-reports
        cp trivy-results.html scan-reports/${{ matrix.dotnet-version }}-${{ matrix.os }}.html        

    - name: Upload scan report for pages
      if: env.RUN_PUBLISH_STEPS == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: scan-report-${{ matrix.dotnet-version }}-${{ matrix.os }}
        path: scan-reports/

    # Publish to Docker Hub steps
    - name: Log in to Docker Hub
      if: env.RUN_PUBLISH_STEPS == 'true'
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}

    - name: Tag and push image to Docker Hub
      if: env.RUN_PUBLISH_STEPS == 'true'
      run: |
        docker tag ${{ env.BASE_IMAGE_TAG }} ${{ env.PUBLISH_IMAGE_TAG }}
        docker push ${{ env.PUBLISH_IMAGE_TAG }}

    - name: Tag default image for dotnet version
      if: env.RUN_PUBLISH_STEPS == 'true' && matrix.os == env.DEFAULT_OS
      run: |
        docker tag ${{ env.BASE_IMAGE_TAG }} abcpdf/mcr-aspnet:${{ matrix.dotnet-version }}
        docker push abcpdf/mcr-aspnet:${{ matrix.dotnet-version }}
        
  publish-scan-reports:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build-test-publish-base-images
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Download all scan reports
      uses: actions/download-artifact@v8
      with:
        pattern: scan-report-*
        path: scan-reports/
        merge-multiple: true

    - name: Create index page
      run: |
        cd scan-reports
        echo '<!DOCTYPE html><html><head><title>Trivy Scan Reports</title></head><body>' > index.html
        echo '<h1>ABCpdf Docker Image Vulnerability Scan Reports</h1><ul>' >> index.html
        for f in *.html; do
          [ "$f" != "index.html" ] && echo "<li><a href=\"$f\">$f</a></li>" >> index.html
        done
        echo '</ul></body></html>' >> index.html

    - name: Setup Pages
      uses: actions/configure-pages@v6

    - name: Upload to Pages
      uses: actions/upload-pages-artifact@v5
      with:
        path: scan-reports/

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5